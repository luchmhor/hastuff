alias: Energy Optimizer — Tactical Control
description: >
  Adjusts inverter output every 5 seconds based on optimizer mode and live grid
  power from shrdzm sensor. Strategic setpoints are used as targets only; all
  modes use closed-loop shrdzm feedback.
triggers:
  - seconds: /5
    trigger: time_pattern
conditions: []
actions:
  - variables:
      mode_id: "{{ states('input_number.energy_optimizer_mode_id') | int }}"
      strategic_sp: "{{ states('input_number.energy_optimizer_setpoint') | float }}"
      grid_w: "{{ states('sensor.shrdzm_485519e15aae_16_7_0') | float }}"
      current_sp: "{{ states('number.apsystems_ezhi_max_output_power') | float }}"
      soc: "{{ states('sensor.ezhi_battery_state_of_charge') | float }}"
      batt_w: "{{ states('sensor.ezhi_battery_power') | float }}"
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ mode_id == 1 }}"
        sequence:
          - variables:
              deadband: 30
              gain: 0.5
              raw_delta: |
                {% if grid_w | abs > deadband %}
                  {{ (gain * grid_w) | round(0) | int }}
                {% else %}
                  0
                {% endif %}
              delta: "{{ ((raw_delta / 20) | round(0) | int) * 20 }}"
              proposed_sp: "{{ current_sp + delta }}"
              new_sp: >
                {% set s = proposed_sp | float %} {% set s = [s, 1200] | min %}
                {% set s = [s, strategic_sp] | max %} {{ s | int }}
          - condition: template
            value_template: "{{ (new_sp - current_sp) | abs >= 20 }}"
          - target:
              entity_id: number.apsystems_ezhi_max_output_power
            data:
              value: "{{ new_sp }}"
            action: number.set_value
      - conditions:
          - condition: template
            value_template: "{{ mode_id == 3 }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ soc >= 98 and batt_w > 0 }}"
                sequence:
                  - target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ [1200, current_sp + 10] | min }}"
                    action: number.set_value
              - conditions:
                  - condition: template
                    value_template: "{{ soc < 96 }}"
                sequence:
                  - target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ [-1200, current_sp - 10] | max }}"
                    action: number.set_value
              - conditions:
                  - condition: template
                    value_template: "{{ soc >= 96 and soc < 98 }}"
                sequence:
                  - condition: template
                    value_template: "{{ (current_sp - 0) | abs >= 20 }}"
                  - target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: 0
                    action: number.set_value
      - conditions:
          - condition: template
            value_template: "{{ mode_id in [0, 2] }}"
        sequence:
          - variables:
              deadband: 30
              gain: 0.5
              raw_delta: |
                {% if grid_w | abs > deadband %}
                  {{ (gain * grid_w) | round(0) | int }}
                {% else %}
                  0
                {% endif %}
              delta: "{{ ((raw_delta / 20) | round(0) | int) * 20 }}"
              proposed_sp: "{{ current_sp + delta }}"
              new_sp: >
                {% set s = proposed_sp | float %}

                {# Hard inverter limits #} {% set s = [s, 1200] | min %} {% set
                s = [s, -1200] | max %}

                {# No export unless battery is full (>= 98%) #} {% if s < 0 and
                soc < 98 %}
                  {% set s = 0 %}
                {% endif %}

                {# Already exporting → reduce setpoint, never increase #} {% if
                grid_w < -30 and delta > 0 %}
                  {% set s = [0, current_sp - 20] | max %}
                {% endif %}

                {# SOC floor: never increase discharge if battery critically low
                #} {% if delta > 0 and soc <= 15 %}
                  {% set s = current_sp %}
                {% endif %}

                {{ s | int }}
          - condition: template
            value_template: "{{ (new_sp - current_sp) | abs >= 20 }}"
          - target:
              entity_id: number.apsystems_ezhi_max_output_power
            data:
              value: "{{ new_sp }}"
            action: number.set_value
mode: single
max_exceeded: silent
