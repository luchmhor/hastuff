alias: Energy Optimizer — Tactical Control
description: >
  Adjusts inverter every 5 seconds. All modes use closed-loop grid_w feedback.
  strategic_sp is a target direction only, never applied directly.

triggers:
  - trigger: time_pattern
    seconds: "/5"

conditions: []

actions:
  - variables:
      mode_id:      "{{ states('input_number.energy_optimizer_mode_id') | int(0) }}"
      strategic_sp: "{{ states('input_number.energy_optimizer_setpoint') | float(0) | int }}"
      grid_w:       "{{ states('sensor.shrdzm_485519e15aae_16_7_0') | float(0) | round(0) | int }}"
      current_sp:   "{{ states('number.apsystems_ezhi_max_output_power') | float(0) | round(0) | int }}"
      soc:          "{{ states('sensor.ezhi_battery_state_of_charge') | float(50) }}"
      batt_w:       "{{ states('sensor.ezhi_battery_power') | float(0) }}"

  - choose:

      # ── 1. GRID_CHARGE (mode 1) ──────────────────────────────────
      # strategic_sp is a TARGET direction, not a direct command.
      # Uses closed-loop grid_w feedback to step towards it.
      # Hard exits if battery is full or not accepting charge.
      # ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ mode_id == 1 }}"
        sequence:
          - choose:
              # Battery full or not accepting charge → stop immediately
              - conditions:
                  - condition: template
                    value_template: "{{ soc >= 98 or (batt_w == 0 and current_sp < 0) }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: 0

              # Step towards strategic_sp using grid_w feedback:
              # grid_w > deadband  → importing too much → charge harder (more negative)
              # grid_w < -deadband → exporting         → charge softer (less negative)
              # grid_w in deadband → hold position
              - conditions:
                  - condition: template
                    value_template: "{{ true }}"
                sequence:
                  - variables:
                      deadband: 30
                      step: >-
                        {% set err = grid_w | abs %}
                        {% if err > 300 %}100
                        {% elif err > 150 %}50
                        {% elif err > 75 %}30
                        {% elif err > 30 %}20
                        {% else %}0{% endif %}
                      new_sp: >-
                        {% if grid_w > deadband %}
                          {{ [strategic_sp, current_sp - step] | max }}
                        {% elif grid_w < -deadband %}
                          {{ [0, current_sp + step] | min }}
                        {% else %}
                          {{ current_sp }}
                        {% endif %}
                  - condition: template
                    value_template: "{{ (new_sp - current_sp) | abs >= 10 }}"
                  - action: number.set_value
                    target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ new_sp }}"

      # ── 2. STALE NEGATIVE GUARD ──────────────────────────────────
      # If inverter is negative but we are NOT in mode 1, zero it
      # immediately. Catches any value left over from a previous
      # GRID_CHARGE cycle before any other branch sees it.
      # ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ current_sp < 0 }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: number.apsystems_ezhi_max_output_power
            data:
              value: 0

      # ── 3. SOC PROTECTION ────────────────────────────────────────
      # Battery nearly empty: stop discharging immediately.
      # ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ soc <= 20 and current_sp > 0 }}"
        sequence:
          - action: number.set_value
            target:
              entity_id: number.apsystems_ezhi_max_output_power
            data:
              value: 0

      # ── 4. TRICKLE (mode 3) ──────────────────────────────────────
      # Hold SOC in 96–98% band by slowly modulating output.
      # ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ mode_id == 3 }}"
        sequence:
          - choose:
              # Full and still absorbing charge → raise output to relieve battery
              - conditions:
                  - condition: template
                    value_template: "{{ soc >= 98 and batt_w > 0 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ [1200, current_sp + 10] | min }}"

              # Below trickle band → lower output to let battery recharge
              - conditions:
                  - condition: template
                    value_template: "{{ soc < 96 }}"
                sequence:
                  - action: number.set_value
                    target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ [0, current_sp - 10] | max }}"

              # In trickle band (96–98%) → creep towards 0
              - conditions:
                  - condition: template
                    value_template: "{{ soc >= 96 and soc < 98 }}"
                sequence:
                  - variables:
                      trickle_sp: >-
                        {% if current_sp > 0 %}
                          {{ [0, current_sp - 10] | max }}
                        {% else %}
                          0
                        {% endif %}
                  - condition: template
                    value_template: "{{ (trickle_sp - current_sp) | abs >= 10 }}"
                  - action: number.set_value
                    target:
                      entity_id: number.apsystems_ezhi_max_output_power
                    data:
                      value: "{{ trickle_sp }}"

      # ── 5. BALANCE (0) + DISCHARGE (2) ───────────────────────────
      # Incremental closed-loop grid tracking.
      # Step UP   when importing  (grid_w > +deadband)
      # Step DOWN when exporting  (grid_w < -deadband)
      # Hold      when in deadband (already balanced)
      #
      # Step size scales with error magnitude for fast convergence
      # from far away and precision near zero.
      # current_sp is guaranteed >= 0 here: branch 2 clears any
      # negative value before this branch is ever reached.
      # ─────────────────────────────────────────────────────────────
      - conditions:
          - condition: template
            value_template: "{{ mode_id in [0, 2] }}"
        sequence:
          - variables:
              deadband: 30
              step: >-
                {% set err = grid_w | abs %}
                {% if err > 300 %}100
                {% elif err > 150 %}50
                {% elif err > 75 %}30
                {% elif err > 30 %}20
                {% else %}0{% endif %}
              new_sp: >-
                {% if grid_w > deadband %}
                  {{ [1200, current_sp + step] | min }}
                {% elif grid_w < -deadband %}
                  {{ [0, current_sp - step] | max }}
                {% else %}
                  {{ current_sp }}
                {% endif %}
          - condition: template
            value_template: "{{ (new_sp - current_sp) | abs >= 10 }}"
          - action: number.set_value
            target:
              entity_id: number.apsystems_ezhi_max_output_power
            data:
              value: "{{ new_sp }}"

mode: single
max_exceeded: silent
